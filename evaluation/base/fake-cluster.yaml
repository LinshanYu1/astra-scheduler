apiVersion: v1
kind: Namespace
metadata:
  name: astra-scheduler-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: astra-eval
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: astra-scheduler-fake-node-resources
  namespace: astra-scheduler-system
data:
  master0.yaml: |
    allocatable:
      gpuCount: 2
      gpuMemoryGiB: 160
      kvCacheGiB: 64
      prefillTokensPerSecond: 4000
      decodeTokensPerSecond: 5000
      totalTokensPerSecond: 9000
    runtime:
      pressure:
        sloRisk: low
        queueDepth: 2
  master1.yaml: |
    allocatable:
      gpuCount: 2
      gpuMemoryGiB: 160
      kvCacheGiB: 48
      prefillTokensPerSecond: 4500
      decodeTokensPerSecond: 3500
      totalTokensPerSecond: 8000
    runtime:
      pressure:
        sloRisk: high
        queueDepth: 12
  worker0.yaml: |
    allocatable:
      gpuCount: 4
      gpuMemoryGiB: 320
      kvCacheGiB: 128
      prefillTokensPerSecond: 6000
      decodeTokensPerSecond: 10000
      totalTokensPerSecond: 14000
    runtime:
      pressure:
        sloRisk: low
        queueDepth: 1
  worker1.yaml: |
    allocatable:
      gpuCount: 3
      gpuMemoryGiB: 240
      kvCacheGiB: 96
      prefillTokensPerSecond: 10000
      decodeTokensPerSecond: 5000
      totalTokensPerSecond: 15000
    runtime:
      pressure:
        sloRisk: low
        queueDepth: 3
---
apiVersion: astra.aiinfra.io/v1alpha1
kind: AINodeResourceProfile
metadata:
  name: master0
  namespace: astra-scheduler-system
spec:
  nodeName: master0
  backendType: fake
  gpus:
    - id: gpu-0
      uuid: GPU-fake-master0-0
      product: fake-a100
      memoryGiB: 80
      computeScore: 100
    - id: gpu-1
      uuid: GPU-fake-master0-1
      product: fake-a100
      memoryGiB: 80
      computeScore: 100
  runtime:
    type: fake
    supports:
      kvCache: true
      tokenThroughput: true
      requestThrottling: true
      pauseResume: true
    capacity:
      kvCacheGiB: 64
      tokenThroughput:
        prefillTokensPerSecond: 4000
        decodeTokensPerSecond: 5000
        totalTokensPerSecond: 9000
  capabilities:
    sharing: true
    borrowing: true
    reclaim: true
    throttling: true
    pauseResume: true
    eviction: true
---
apiVersion: astra.aiinfra.io/v1alpha1

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: astra-agent
  namespace: system
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/component: astra-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: astra-scheduler
      app.kubernetes.io/component: astra-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: astra-scheduler
        app.kubernetes.io/component: astra-agent
    spec:
      serviceAccountName: controller-manager
      containers:
      - name: agent
        image: controller:latest
        imagePullPolicy: IfNotPresent
        command:
        - /agent
        args:
        - --backend=fake
        - --node-profile-namespace=$(POD_NAMESPACE)
        - --fake-resource-configmap=astra-scheduler-fake-node-resources
        - --fake-resource-configmap-namespace=$(POD_NAMESPACE)
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
      terminationGracePeriodSeconds: 10

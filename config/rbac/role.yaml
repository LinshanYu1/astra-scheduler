apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/managed-by: kustomize
  name: manager-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["astra.aiinfra.io"]
  resources: ["ainoderesourceprofiles", "airesourceallocations", "aiworkloadprofiles"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["astra.aiinfra.io"]
  resources: ["ainoderesourceprofiles/status", "airesourceallocations/status", "aiworkloadprofiles/status"]
  verbs: ["get", "update", "patch"]

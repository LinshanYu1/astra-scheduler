# This rule is not used by the project astra-scheduler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over astra.aiinfra.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/managed-by: kustomize
  name: ainoderesourceprofile-admin-role
rules:
- apiGroups:
  - astra.aiinfra.io
  resources:
  - ainoderesourceprofiles
  verbs:
  - '*'
- apiGroups:
  - astra.aiinfra.io
  resources:
  - ainoderesourceprofiles/status
  verbs:
  - get

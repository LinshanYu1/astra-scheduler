# This rule is not used by the project astra-scheduler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the astra.aiinfra.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/managed-by: kustomize
  name: airesourceallocation-editor-role
rules:
- apiGroups:
  - astra.aiinfra.io
  resources:
  - airesourceallocations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - astra.aiinfra.io
  resources:
  - airesourceallocations/status
  verbs:
  - get

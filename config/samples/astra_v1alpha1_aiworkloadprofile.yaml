apiVersion: astra.aiinfra.io/v1alpha1
kind: AIWorkloadProfile
metadata:
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/managed-by: kustomize
  name: live-chat-ai
  namespace: ai
spec:
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: live-chat-ai
    namespace: ai
  workloadType: online
  priority: high
  demandShape: decode_heavy
  timeWindows:
    - name: evening-peak
      start: "20:00"
      end: "02:00"
      timezone: America/New_York
  slo:
    ttftP95Ms: 800
    latencyP99Ms: 3000
  resources:
    required:
      gpuCount: 1
      gpuMemoryGiB: 10
      kvCacheGiB: 16
      decodeTokensPerSecond: 1000
    preferred:
      gpuCount: 1
      gpuMemoryGiB: 20
      kvCacheGiB: 32
      decodeTokensPerSecond: 2500
  policy:
    allowBorrowing: false
    allowReclaimFromLowerPriority: true
    throttleable: false
    pauseable: false
    evictable: false

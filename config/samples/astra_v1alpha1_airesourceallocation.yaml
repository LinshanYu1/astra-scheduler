apiVersion: astra.aiinfra.io/v1alpha1
kind: AIResourceAllocation
metadata:
  name: worker0-allocation
  namespace: astra-system
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/managed-by: kustomize
    astra.aiinfra.io/node-name: worker0
spec:
  nodeName: worker0
  reason: "Node-level allocation ledger maintained by astra-agent."
  workloads:
    - name: ai/live-chat-ai
      workloadRef:
        apiVersion: astra.aiinfra.io/v1alpha1
        kind: AIWorkloadProfile
        name: live-chat-ai
        namespace: ai
      workloadType: online
      priority: high
      demandShape: decode_heavy
      timeWindows:
        - name: evening-peak
          start: "20:00"
          end: "02:00"
          timezone: America/New_York
      resourceRequest:
        required:
          gpuCount: 1
          gpuMemoryGiB: 10
          kvCacheGiB: 16
          decodeTokensPerSecond: 1000
        preferred:
          gpuCount: 1
          gpuMemoryGiB: 20
          kvCacheGiB: 32
          decodeTokensPerSecond: 2500
        max:
          gpuCount: 1
          gpuMemoryGiB: 30
          kvCacheGiB: 48
          decodeTokensPerSecond: 4000
      desired:
        gpuCount: 1
        gpuMemoryGiB: 30
        kvCacheGiB: 48
        decodeTokensPerSecond: 4000
      assignedGPU:
        gpuID: gpu-0
        migSliceID: mig-0
      allocationType: guaranteed
      actions:
        reclaimable: false
        throttleable: false
        pauseable: false
        evictable: false
      reason: "Peak online workload receives max budget during its active window."
    - name: ai/offline-embedding
      workloadRef:
        apiVersion: astra.aiinfra.io/v1alpha1
        kind: AIWorkloadProfile
        name: offline-embedding
        namespace: ai
      workloadType: offline
      priority: low
      demandShape: prefill_heavy
      resourceRequest:
        required:
          gpuCount: 0
          gpuMemoryGiB: 8
          prefillTokensPerSecond: 500
        preferred:
          gpuCount: 1
          gpuMemoryGiB: 20
          prefillTokensPerSecond: 2000
        max:
          gpuCount: 1
          gpuMemoryGiB: 24
          prefillTokensPerSecond: 3000
      desired:
        gpuCount: 0
        gpuMemoryGiB: 8
        prefillTokensPerSecond: 500
      allocationType: borrowed
      actions:
        reclaimable: true
        throttleable: true
        pauseable: true
        evictable: true
      reason: "Delay-tolerant workload yields resources to high-priority peak traffic."

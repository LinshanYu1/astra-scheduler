apiVersion: astra.aiinfra.io/v1alpha1
kind: AIResourceAllocation
metadata:
  namespace: ai
  labels:
    app.kubernetes.io/name: astra-scheduler
    app.kubernetes.io/managed-by: kustomize
    astra.aiinfra.io/workload-namespace: ai
    astra.aiinfra.io/workload-name: live-chat-ai
    astra.aiinfra.io/node-name: worker0
    astra.aiinfra.io/priority: high
  name: ai-live-chat-ai-worker0-gpu0
spec:
  workloadRef:
    apiVersion: astra.aiinfra.io/v1alpha1
    kind: AIWorkloadProfile
    name: live-chat-ai
    namespace: ai
  workloadType: online
  priority: high
  demandShape: decode_heavy
  timeWindows:
    - name: evening-peak
      start: "20:00"
      end: "02:00"
      timezone: America/New_York
  resourceRequest:
    required:
      gpuCount: 1
      gpuMemoryGiB: 10
      kvCacheGiB: 16
      decodeTokensPerSecond: 1000
    preferred:
      gpuCount: 1
      gpuMemoryGiB: 20
      kvCacheGiB: 32
      decodeTokensPerSecond: 2500
    max:
      gpuCount: 1
      gpuMemoryGiB: 30
      kvCacheGiB: 48
      decodeTokensPerSecond: 4000
  nodeName: worker0
  assignedGPU:
    gpuID: gpu-0
    migSliceID: mig-0
  resources:
    gpuCount: 1
    gpuMemoryGiB: 20
    kvCacheGiB: 24
    prefillTokensPerSecond: 500
    decodeTokensPerSecond: 2000
  allocationType: guaranteed
  actions:
    reclaimable: false
    throttleable: false
    pauseable: false
    evictable: false
  reason: "Scheduled to worker0 because it has an available MIG slice, enough KV-cache budget, and low decode pressure."
